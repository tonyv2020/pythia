# Pythia nightly retrain — assembles the D8-backfilled dataset (full 20-symbol
# board + yfinance history from 2018-01-01, raptor feed truth for recent),
# runs walk-forward TFT-lite, registers the report in pythia_models.
#
# Runs at 09:15 UTC Mon-Fri = post-close US session so raptor's daily bars
# are finalised. helen owns the schedule; adjust if raptor's ingest cadence
# changes.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pythia-nightly-retrain
  namespace: pythia
spec:
  schedule: "15 9 * * 1-5"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trainer
              image: registry.lan/pythia-trainer:0.1.0
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "scripts.nightly_retrain"]
              # Defaults in scripts.nightly_retrain now opt INTO the D8
              # backfill (yfinance, split-adjusted, 2018-01-01+, full board,
              # initial_train=252, eval_size=21). Pass overrides only when
              # helen wants a diagnostic run on the thin default.
              args:
                - --data-dir=/data
                - --model-name=tft_lite_daily_qqq
              env:
                - name: PYTHIA_DB_DSN
                  valueFrom:
                    secretKeyRef: { name: pythia-db, key: dsn }
                - name: PYTHIA_REGISTRY_DSN
                  valueFrom:
                    secretKeyRef: { name: pythia-db, key: dsn }
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                  nvidia.com/gpu: 1
                limits:
                  cpu: "2"
                  memory: 4Gi
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: pythia-data
