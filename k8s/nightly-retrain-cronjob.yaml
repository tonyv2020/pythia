# Pythia nightly retrain — assembles the D8-backfilled dataset (full 20-symbol
# board + yfinance history from 2018-01-01, raptor feed truth for recent),
# runs walk-forward TFT-lite, registers the report in pythia_models.
#
# Runs at 09:15 UTC Mon-Fri = post-close US session so raptor's daily bars
# are finalised. helen owns the schedule; adjust if raptor's ingest cadence
# changes.
#
# 2026-07-13 (twin per helen D28): image was `registry.lan/pythia-trainer:0.1.0`
# which never existed in the registry — the cronjob had never fired. Follow the
# agent-2 conf-60 Job pattern: pytorch base + hostPath-mounted source + inline
# `pip install -e .`. Source at /home/shared/dev/workspace/pythia is the same
# main worktree everyone else uses, so a merge to main is picked up automatically
# on the next cron fire (no image rebuild needed for pythia code changes).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pythia-nightly-retrain
  namespace: pythia
spec:
  schedule: "15 9 * * 1-5"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          runtimeClassName: nvidia
          containers:
            - name: trainer
              image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
              imagePullPolicy: IfNotPresent
              command: ["bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  cd /pythia
                  pip install -q -e . scipy yfinance psycopg[binary] 2>&1 | tail -3
                  python -m scripts.nightly_retrain \
                    --data-dir /data \
                    --model-name tft_lite_daily_qqq \
                    --artifact-uri file:///data/report.json
              env:
                - name: PYTHIA_DB_DSN
                  valueFrom:
                    secretKeyRef: { name: pythia-db, key: src_dsn }
                - name: PYTHIA_REGISTRY_DSN
                  valueFrom:
                    secretKeyRef: { name: pythia-db, key: registry_dsn }
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                  nvidia.com/gpu: 1
                limits:
                  cpu: "2"
                  memory: 4Gi
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: pythia
                  mountPath: /pythia
                - name: data
                  mountPath: /data
          volumes:
            - name: pythia
              hostPath:
                path: /home/shared/dev/workspace/pythia
                type: Directory
            - name: data
              persistentVolumeClaim:
                claimName: pythia-data
